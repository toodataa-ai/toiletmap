<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公園マップ 管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #F5F5F5; color: #212121; }
    header {
      background: #1B5E20; color: #fff;
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 18px; }
    header a { color: #A5D6A7; font-size: 13px; margin-left: auto; text-decoration: none; }
    header a:hover { text-decoration: underline; }

    .container { max-width: 640px; margin: 32px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: #fff; border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: #2E7D32; }

    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; color: #2E7D32; }
    .stat-label { font-size: 12px; color: #757575; margin-top: 2px; }

    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .badge.idle    { background: #E8F5E9; color: #2E7D32; }
    .badge.running { background: #FFF8E1; color: #F57F17; }
    .badge.done    { background: #E3F2FD; color: #1565C0; }

    .progress-wrap { background: #E8F5E9; border-radius: 4px; height: 8px; overflow: hidden; margin: 6px 0; }
    .progress-fill {
      height: 100%; background: #4CAF50; border-radius: 4px;
      transition: width 0.5s ease; width: 0%;
    }
    .progress-wrap.indeterminate .progress-fill {
      width: 40% !important;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide { 0% { margin-left:-40%; } 100% { margin-left:110%; } }

    .btn {
      display: inline-block; padding: 10px 24px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2E7D32; color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .hint-text { font-size: 13px; color: #555; margin-bottom: 14px; }

    /* チェックボックスリスト */
    .src-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .src-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; cursor: pointer; user-select: none;
    }
    .src-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #2E7D32; }
    .src-item.sub-opt { margin-left: 26px; font-size: 13px; color: #555; }
    .src-link { font-size: 11px; color: #1565C0; text-decoration: none; margin-left: auto; white-space: nowrap; }
    .src-link:hover { text-decoration: underline; }

    /* 進捗エリア */
    .prog-area { margin-top: 20px; border-top: 1px solid #E8F5E9; padding-top: 16px; display: flex; flex-direction: column; gap: 14px; }
    .src-prog-row { }
    .src-prog-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .src-prog-detail { font-size: 12px; color: #555; min-height: 16px; }

    /* 公園探訪郊外 */
    #status-detail { font-size: 13px; color: #555; line-height: 1.6; min-height: 20px; }

    .schedule-info { font-size: 13px; color: #555; line-height: 1.8; }
    .schedule-info code { background: #E8F5E9; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
<header>
  <span>🌳</span>
  <h1>公園マップ 管理</h1>
  <a href="/">← トップに戻る</a>
  <a href="/map.html">🗺 マップを開く</a>
</header>

<div class="container">

  <!-- 統計 -->
  <div class="card">
    <h2>📊 現在の統計</h2>
    <div class="stats-grid">
      <div class="stat"><div class="stat-num" id="s-parks">…</div><div class="stat-label">公園数</div></div>
      <div class="stat"><div class="stat-num" id="s-photos">…</div><div class="stat-label">写真数</div></div>
      <div class="stat"><div class="stat-num" id="s-visits">…</div><div class="stat-label">訪問数</div></div>
    </div>
  </div>

  <!-- 公園探訪郊外 -->
  <div class="card">
    <h2>🌐 公園探訪郊外 データ同期</h2>
    <div class="status-row">
      <span>ステータス：</span>
      <span id="sync-badge" class="badge idle">待機中</span>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="status-detail">—</div>
    <div style="margin-top:16px;">
      <button id="run-btn" class="btn btn-primary">▶ 今すぐ実行</button>
    </div>
  </div>

  <!-- 水遊び公園（統合） -->
  <div class="card">
    <h2>💧 水遊び公園データ取得</h2>
    <p class="hint-text">取得するソースにチェックを入れて実行してください</p>

    <div class="src-list">
      <label class="src-item">
        <input type="checkbox" class="water-src" value="shinjuku" checked>
        <span>🏙️ 新宿区（水遊び場）</span>
        <a class="src-link" href="https://www.city.shinjuku.lg.jp/seikatsu/file15_03_00020.html" target="_blank" rel="noopener">出典↗</a>
      </label>
      <label class="src-item">
        <input type="checkbox" class="water-src" value="suginami" checked>
        <span>🏙️ 杉並区（流れのある公園）</span>
        <a class="src-link" href="https://www.city.suginami.tokyo.jp/s100/1621.html" target="_blank" rel="noopener">出典↗</a>
      </label>
      <label class="src-item">
        <input type="checkbox" class="water-src" value="nerima" checked>
        <span>🏙️ 練馬区（水施設）</span>
        <a class="src-link" href="https://www.city.nerima.tokyo.jp/kankomoyoshi/annai/fukei/nerima_park/kunai/mizusisetu.html" target="_blank" rel="noopener">出典↗</a>
      </label>
      <label class="src-item">
        <input type="checkbox" class="water-src" value="minato" checked>
        <span>🏙️ 港区（水遊び場）</span>
        <a class="src-link" href="https://www.city.minato.tokyo.jp/shiba-koudobokutan/tosyouike.html" target="_blank" rel="noopener">出典↗</a>
      </label>
      <label class="src-item">
        <input type="checkbox" class="water-src" value="toritsu" checked>
        <span>🌳 都立公園（水遊び22件）</span>
        <a class="src-link" href="https://www.kensetsu.metro.tokyo.lg.jp/park/kouenannai/mizu" target="_blank" rel="noopener">出典↗</a>
      </label>
      <label class="src-item sub-opt" id="toritsu-force-wrap">
        <input type="checkbox" id="toritsu-force-chk">
        <span>↳ 座標も再取得する（全件）</span>
      </label>
    </div>

    <button id="water-run-btn" class="btn btn-primary">▶ 選択したソースを取得</button>

    <!-- 進捗エリア（実行後に表示） -->
    <div class="prog-area" id="water-prog-area" style="display:none">

      <div class="src-prog-row" id="wpr-shinjuku" style="display:none">
        <div class="src-prog-label">🏙️ 新宿区 <span class="badge idle" id="wbg-shinjuku">待機中</span></div>
        <div class="progress-wrap" id="wpw-shinjuku"><div class="progress-fill" id="wpf-shinjuku"></div></div>
        <div class="src-prog-detail" id="wpd-shinjuku">—</div>
      </div>

      <div class="src-prog-row" id="wpr-suginami" style="display:none">
        <div class="src-prog-label">🏙️ 杉並区 <span class="badge idle" id="wbg-suginami">待機中</span></div>
        <div class="progress-wrap" id="wpw-suginami"><div class="progress-fill" id="wpf-suginami"></div></div>
        <div class="src-prog-detail" id="wpd-suginami">—</div>
      </div>

      <div class="src-prog-row" id="wpr-nerima" style="display:none">
        <div class="src-prog-label">🏙️ 練馬区 <span class="badge idle" id="wbg-nerima">待機中</span></div>
        <div class="progress-wrap" id="wpw-nerima"><div class="progress-fill" id="wpf-nerima"></div></div>
        <div class="src-prog-detail" id="wpd-nerima">—</div>
      </div>

      <div class="src-prog-row" id="wpr-minato" style="display:none">
        <div class="src-prog-label">🏙️ 港区 <span class="badge idle" id="wbg-minato">待機中</span></div>
        <div class="progress-wrap" id="wpw-minato"><div class="progress-fill" id="wpf-minato"></div></div>
        <div class="src-prog-detail" id="wpd-minato">—</div>
      </div>

      <div class="src-prog-row" id="wpr-toritsu" style="display:none">
        <div class="src-prog-label">🌳 都立公園 <span class="badge idle" id="wbg-toritsu">待機中</span></div>
        <div class="progress-wrap" id="wpw-toritsu"><div class="progress-fill" id="wpf-toritsu"></div></div>
        <div class="src-prog-detail" id="wpd-toritsu">—</div>
      </div>

    </div>
  </div>

  <!-- スケジュール情報 -->
  <div class="card">
    <h2>⏰ 自動スケジュール</h2>
    <div class="schedule-info">
      毎日 <code>02:00 JST</code> に自動で差分同期を実行します。<br>
      ※ Render 無料プランはスリープ中は実行されません。<br>
      手動実行は上の「今すぐ実行」ボタンで行えます。
    </div>
  </div>

</div>

<script>
// ── 統計 ────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await fetch('/api/stats').then(r => r.json());
    document.getElementById('s-parks').textContent  = (d.parks  || 0).toLocaleString();
    document.getElementById('s-photos').textContent = (d.photos || 0).toLocaleString();
    document.getElementById('s-visits').textContent = (d.visits || 0).toLocaleString();
  } catch (e) {}
}

// ── 公園探訪郊外 ─────────────────────────────────────────────────────────────
let pollTimer = null;
let startTime = 0;

function setIdle(msg = '—') {
  document.getElementById('sync-badge').className = 'badge idle';
  document.getElementById('sync-badge').textContent = '待機中';
  document.getElementById('progress-wrap').classList.remove('indeterminate');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('status-detail').textContent = msg;
  document.getElementById('run-btn').disabled = false;
}

function setRunning() {
  document.getElementById('sync-badge').className = 'badge running';
  document.getElementById('sync-badge').textContent = '実行中';
  document.getElementById('run-btn').disabled = true;
}

async function pollStatus() {
  try {
    const s = await fetch('/api/sync/koentanbo/status').then(r => r.json());
    const wrap = document.getElementById('progress-wrap');
    const fill = document.getElementById('progress-fill');
    const detail = document.getElementById('status-detail');

    if (s.running || s.done > 0) {
      setRunning();
      if (s.total === 0) {
        wrap.classList.add('indeterminate');
        detail.textContent = '初期化中…';
      } else {
        wrap.classList.remove('indeterminate');
        fill.style.width = Math.round(s.done / s.total * 100) + '%';
        let eta = '';
        if (s.done > 10) {
          const elapsed = (Date.now() - startTime) / 1000;
          const rate = s.done / elapsed;
          const sec = Math.round((s.total - s.done) / rate);
          eta = sec > 60 ? `　残り約${Math.round(sec/60)}分` : `　残り約${sec}秒`;
        }
        detail.textContent =
          `${s.done.toLocaleString()} / ${s.total.toLocaleString()} 件処理` +
          `　登録/更新: ${s.inserted}件` +
          (s.skipped > 0 ? `　スキップ: ${s.skipped.toLocaleString()}件` : '') + eta;
      }
    }

    if (!s.running && s.done > 0) {
      clearInterval(pollTimer); pollTimer = null;
      setIdle(`完了: ${s.inserted}件 登録/更新、${s.skipped.toLocaleString()}件 スキップ`);
      loadStats();
    } else if (!s.running && s.done === 0) {
      setIdle();
    }
  } catch (e) {}
}

document.getElementById('run-btn').addEventListener('click', async () => {
  if (!confirm('公園探訪郊外からデータを取得します。\n初回は2〜3分、2回目以降は差分のみです。よろしいですか？')) return;
  startTime = Date.now();
  setRunning();
  document.getElementById('progress-wrap').classList.add('indeterminate');
  document.getElementById('status-detail').textContent = '開始しています…';
  try { await fetch('/api/sync/koentanbo', { method: 'POST' }); } catch (e) {}
  clearInterval(pollTimer);
  pollTimer = setInterval(pollStatus, 2000);
});

(async () => {
  await loadStats();
  const s = await fetch('/api/sync/koentanbo/status').then(r => r.json()).catch(() => ({}));
  if (s.running) { startTime = Date.now(); setRunning(); pollTimer = setInterval(pollStatus, 2000); }
})();

// ── 水遊び公園 統合UI ─────────────────────────────────────────────────────────
const WATER_SOURCES = {
  shinjuku: { label: '新宿区', api: '/api/sync/shinjuku', status: '/api/sync/shinjuku/status' },
  suginami: { label: '杉並区', api: '/api/sync/suginami', status: '/api/sync/suginami/status' },
  nerima:   { label: '練馬区', api: '/api/sync/nerima',   status: '/api/sync/nerima/status'   },
  minato:   { label: '港区',   api: '/api/sync/minato',   status: '/api/sync/minato/status'   },
  toritsu:  { label: '都立公園', api: '/api/sync/toritsu', status: '/api/sync/toritsu/status' },
};

const waterPollers = {};

function wSetBadge(src, cls, text) {
  const el = document.getElementById(`wbg-${src}`);
  el.className = `badge ${cls}`;
  el.textContent = text;
}

function wSetProgress(src, done, total, inserted) {
  const wrap = document.getElementById(`wpw-${src}`);
  wrap.classList.remove('indeterminate');
  document.getElementById(`wpf-${src}`).style.width = (total > 0 ? Math.round(done / total * 100) : 0) + '%';
  document.getElementById(`wpd-${src}`).textContent = `${done} / ${total} 件処理　登録: ${inserted}件`;
}

async function pollWaterSource(src) {
  const cfg = WATER_SOURCES[src];
  try {
    const s = await fetch(cfg.status).then(r => r.json());
    if (s.running) {
      wSetBadge(src, 'running', '実行中');
      if (s.total > 0) {
        wSetProgress(src, s.done, s.total, s.inserted);
      } else {
        document.getElementById(`wpw-${src}`).classList.add('indeterminate');
        document.getElementById(`wpd-${src}`).textContent = '初期化中…';
      }
    } else {
      clearInterval(waterPollers[src]);
      delete waterPollers[src];
      wSetBadge(src, 'done', '完了');
      document.getElementById(`wpw-${src}`).classList.remove('indeterminate');
      document.getElementById(`wpf-${src}`).style.width = '100%';
      document.getElementById(`wpd-${src}`).textContent =
        `完了: ${s.inserted}件 登録 / ${s.deleted || 0}件 削除`;
      if (Object.keys(waterPollers).length === 0) {
        document.getElementById('water-run-btn').disabled = false;
        loadStats();
      }
    }
  } catch (e) {
    clearInterval(waterPollers[src]);
    delete waterPollers[src];
  }
}

document.getElementById('water-run-btn').addEventListener('click', async () => {
  const checked = [...document.querySelectorAll('.water-src:checked')].map(el => el.value);
  if (checked.length === 0) { alert('ソースを1つ以上選択してください'); return; }
  const labels = checked.map(s => WATER_SOURCES[s].label).join('・');
  if (!confirm(`${labels} のデータを取得します。よろしいですか？`)) return;

  const toritsuForce = document.getElementById('toritsu-force-chk').checked;
  document.getElementById('water-prog-area').style.display = 'flex';
  document.getElementById('water-run-btn').disabled = true;

  // 選択ソースの行のみ表示・リセット
  for (const src of Object.keys(WATER_SOURCES)) {
    const row = document.getElementById(`wpr-${src}`);
    if (checked.includes(src)) {
      row.style.display = 'block';
      wSetBadge(src, 'running', '実行中');
      document.getElementById(`wpw-${src}`).classList.add('indeterminate');
      document.getElementById(`wpf-${src}`).style.width = '0%';
      document.getElementById(`wpd-${src}`).textContent = '開始しています…';
    } else {
      row.style.display = 'none';
    }
  }

  // 全チェックソースを同時起動
  for (const src of checked) {
    let url = WATER_SOURCES[src].api;
    if (src === 'toritsu' && toritsuForce) url += '?force=true';
    try { await fetch(url, { method: 'POST' }); } catch (e) {}
    if (waterPollers[src]) clearInterval(waterPollers[src]);
    waterPollers[src] = setInterval(() => pollWaterSource(src), 2000);
  }
});

// 起動時にすでに実行中のソースがあればポーリング開始
(async () => {
  for (const [src, cfg] of Object.entries(WATER_SOURCES)) {
    const s = await fetch(cfg.status).then(r => r.json()).catch(() => ({}));
    if (s.running) {
      document.getElementById('water-prog-area').style.display = 'flex';
      document.getElementById(`wpr-${src}`).style.display = 'block';
      wSetBadge(src, 'running', '実行中');
      document.getElementById('water-run-btn').disabled = true;
      waterPollers[src] = setInterval(() => pollWaterSource(src), 2000);
    }
  }
})();
</script>
</body>
</html>
