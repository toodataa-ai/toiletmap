<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公園一覧 - 公園マップ 東京</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="list-page">

  <header id="header">
    <div id="header-left">
      <a href="/" class="header-home" aria-label="トップへ">🏠</a>
      <span class="header-icon">🌳</span>
      <h1>公園一覧</h1>
    </div>
    <div id="header-right">
      <a href="map.html" class="header-map-btn">🗺️ 地図</a>
    </div>
  </header>

  <div class="list-wrap">

    <!-- タブ -->
    <div class="list-tabs">
      <button class="list-tab active" data-tab="water">
        💧 水遊び公園
        <span class="tab-count" id="water-count"></span>
      </button>
      <button class="list-tab" data-tab="koentanbo">
        🌿 探訪公園
        <span class="tab-count" id="kb-count"></span>
      </button>
    </div>

    <!-- 検索 -->
    <div class="list-search-wrap">
      <input type="search" id="list-search"
             placeholder="公園名・住所で絞り込み…" autocomplete="off" />
    </div>

    <!-- 水遊び公園ペイン -->
    <div id="pane-water" class="list-pane">
      <div id="water-content" class="list-loading-wrap">
        <div class="spinner"></div>
        <p>読み込み中…</p>
      </div>
    </div>

    <!-- 探訪公園ペイン -->
    <div id="pane-koentanbo" class="list-pane hidden">
      <div id="kb-content" class="list-loading-wrap">
        <div class="spinner"></div>
        <p>読み込み中…</p>
      </div>
    </div>

  </div>

  <script>
    const SOURCE_LABELS = {
      toritsu:    '都立公園',
      shinjuku:   '新宿区',
      suginami:   '杉並区',
      nerima:     '練馬区',
      minato:     '港区',
      ota:        '大田区',
      setagaya:   '世田谷区',
      taito:      '台東区',
      bunkyo:     '文京区',
      kita:       '北区',
      arakawa:    '荒川区',
      itabashi:   '板橋区',
      adachi:     '足立区',
      katsushika: '葛飾区',
      chiyoda:    '千代田区',
      sumida:     '墨田区',
      koto:       '江東区',
      shinagawa:  '品川区',
      meguro:     '目黒区',
      shibuya:    '渋谷区',
      nakano:     '中野区',
      edogawa:    '江戸川区',
      koentanbo:  '探訪',
    };

    let waterParks = [];
    let kbParks    = [];
    let activeTab  = 'water';
    let query      = '';

    // ── タブ切り替え ──────────────────────────────────────
    document.querySelectorAll('.list-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.list-tab').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('pane-water').classList.toggle('hidden', activeTab !== 'water');
        document.getElementById('pane-koentanbo').classList.toggle('hidden', activeTab !== 'koentanbo');
        renderActive();
      });
    });

    // ── 検索 ─────────────────────────────────────────────
    let searchTimer;
    document.getElementById('list-search').addEventListener('input', function () {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        query = this.value.trim().toLowerCase();
        renderActive();
      }, 200);
    });

    function renderActive() {
      if (activeTab === 'water') renderWater();
      else renderKoentanbo();
    }

    function escHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── 水遊び公園 テーブル描画 ──────────────────────────────
    function renderWater() {
      const filtered = waterParks.filter(p => {
        if (!query) return true;
        return p.name.toLowerCase().includes(query) ||
               (p.address || '').toLowerCase().includes(query);
      });

      const el = document.getElementById('water-content');
      if (filtered.length === 0) {
        el.innerHTML = '<div class="list-empty">該当する公園がありません</div>';
        return;
      }

      let html = `
        <div class="table-wrap">
          <table class="park-table">
            <thead>
              <tr>
                <th>種類</th>
                <th>区名</th>
                <th>公園名</th>
                <th>住所</th>
              </tr>
            </thead>
            <tbody>`;

      filtered.forEach(p => {
        const ward  = escHtml(SOURCE_LABELS[p.source] || p.source);
        const addr  = escHtml(p.address || '');
        const addrShort = (p.address || '').replace(/^東京都/, '');
        html += `<tr>
          <td><span class="type-badge water">💧水遊び</span></td>
          <td class="cell-ward">${ward}</td>
          <td class="cell-name">
            <a href="map.html?park=${p.id}" class="park-link">${escHtml(p.name)}</a>
          </td>
          <td class="cell-addr" title="${addr}">${escHtml(addrShort)}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      el.innerHTML = html;
    }

    // ── 探訪公園 テーブル描画 ────────────────────────────────
    function renderKoentanbo() {
      const filtered = kbParks.filter(p =>
        !query || p.name.toLowerCase().includes(query)
      );

      const el = document.getElementById('kb-content');
      if (filtered.length === 0) {
        el.innerHTML = '<div class="list-empty">該当する公園がありません</div>';
        return;
      }

      let html = `
        <div class="table-wrap">
          <table class="park-table">
            <thead>
              <tr>
                <th>種類</th>
                <th>区名</th>
                <th>公園名</th>
                <th>住所</th>
              </tr>
            </thead>
            <tbody>`;

      filtered.forEach(p => {
        const ward = escHtml(SOURCE_LABELS[p.source] || p.source);
        const addr = escHtml((p.address || '').replace(/^東京都/, ''));
        const thumb = p.photo_url
          ? `<img src="${escHtml(p.photo_url)}" alt="" class="row-thumb" loading="lazy" onerror="this.style.display='none'" />`
          : '';
        html += `<tr>
          <td><span class="type-badge kb">🌿探訪</span></td>
          <td class="cell-ward">${ward}</td>
          <td class="cell-name">
            <a href="map.html?park=${p.id}" class="park-link">${thumb}${escHtml(p.name)}</a>
          </td>
          <td class="cell-addr">${addr}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      el.innerHTML = html;
    }

    // ── データ取得 ────────────────────────────────────────
    async function loadWater() {
      try {
        const r = await fetch('/api/parks/list?source=water');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        waterParks = await r.json();
        document.getElementById('water-count').textContent = waterParks.length;
        renderWater();
      } catch(e) {
        document.getElementById('water-content').innerHTML =
          `<div class="list-error">⚠️ データの取得に失敗しました（${e.message}）</div>`;
      }
    }

    async function loadKoentanbo() {
      try {
        const r = await fetch('/api/parks/list?source=koentanbo&limit=2000');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        kbParks = await r.json();
        document.getElementById('kb-count').textContent = kbParks.length;
        if (activeTab === 'koentanbo') renderKoentanbo();
      } catch(e) {
        document.getElementById('kb-content').innerHTML =
          `<div class="list-error">⚠️ データの取得に失敗しました（${e.message}）</div>`;
      }
    }

    loadWater();
    loadKoentanbo();
  </script>
</body>
</html>
