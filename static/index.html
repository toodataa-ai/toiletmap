<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌳 公園マップ 東京</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="top-page">
  <div class="top-wrap">

    <div class="top-hero">
      <div class="top-emoji">🌳</div>
      <h1 class="top-title">公園マップ 東京</h1>
      <p class="top-subtitle">東京の公園・遊び場を探して、遊具の写真をシェアしよう</p>
    </div>

    <div class="top-stats">
      <div class="top-stat-card">
        <div class="top-stat-num" id="stat-parks">…</div>
        <div class="top-stat-label">登録公園数</div>
      </div>
      <div class="top-stat-card">
        <div class="top-stat-num" id="stat-photos">…</div>
        <div class="top-stat-label">投稿写真数</div>
      </div>
      <div class="top-stat-card">
        <div class="top-stat-num" id="stat-visits">…</div>
        <div class="top-stat-label">訪問者数</div>
      </div>
    </div>

    <div class="top-guide">
      <h2 class="top-guide-title">使い方</h2>
      <div class="guide-step">
        <div class="guide-step-icon">🗺️</div>
        <div class="guide-step-body">
          <strong>地図で公園を探す</strong>
          <p>現在地ボタンで近くの公園・遊び場をすぐ確認できます</p>
        </div>
      </div>
      <div class="guide-step">
        <div class="guide-step-icon">📸</div>
        <div class="guide-step-body">
          <strong>遊具の写真を見る・投稿する</strong>
          <p>公園をタップして遊具の写真を確認。URLで写真をシェアできます</p>
        </div>
      </div>
      <div class="guide-step">
        <div class="guide-step-icon">📍</div>
        <div class="guide-step-body">
          <strong>新しい公園を追加する</strong>
          <p>地図上の ＋ボタンで未登録の公園を追加できます</p>
        </div>
      </div>
    </div>

    <a href="map.html" class="top-btn">地図を開く →</a>
    <a href="admin.html" class="top-admin-link">⚙ 管理画面</a>
  </div>

  <script>
    fetch('/api/visit', { method: 'POST' }).catch(() => {});
    fetch('/api/stats')
      .then(r => r.json())
      .then(d => {
        document.getElementById('stat-parks').textContent  = (d.parks  || 0).toLocaleString();
        document.getElementById('stat-photos').textContent = (d.photos || 0).toLocaleString();
        document.getElementById('stat-visits').textContent = (d.visits || 0).toLocaleString();
      })
      .catch(() => {});
  </script>
</body>
</html>
